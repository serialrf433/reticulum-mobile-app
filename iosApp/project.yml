# XcodeGen spec for the Reticulum iOS app.
#
# Why XcodeGen instead of a hand-checked-in `.xcodeproj`: project.pbxproj
# is generated XML that's painful to merge and trivially diff-noise on
# every Xcode tweak. XcodeGen keeps the project definition declarative
# and small (this file).
#
# Bootstrap:
#   brew install xcodegen
#   cd iosApp && xcodegen generate
#   open iosApp.xcodeproj
#
# This expects the KMP `Shared.xcframework` to exist at
# `../shared/build/XCFrameworks/release/Shared.xcframework`. Build it
# with:
#   ./gradlew :shared:assembleSharedXCFramework
# from the repo root (requires macOS — Kotlin/Native for Apple targets
# needs the Xcode toolchain).

name: iosApp
options:
  bundleIdPrefix: io.github.thatsfguy.reticulum
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # XcodeGen produces an Xcode 16 project file (objectVersion 77).
  # The release workflow runs on macos-15 (Xcode 16) which accepts
  # this format. Local devs on Xcode 15 should `brew upgrade xcode`
  # or pin XcodeGen to a 2.42.x release that emits the older format.

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Reticulum
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          # Lets the app keep its CBCentralManager attached while
          # backgrounded so incoming LXMF messages from the LoRa mesh
          # still trigger local notifications. Pair with state
          # restoration (CBCentralManagerOptionRestoreIdentifierKey)
          # before relying on this in production builds.
          - bluetooth-central
        NSBluetoothAlwaysUsageDescription: >-
          Reticulum uses Bluetooth Low Energy to talk to your local RNode
          (LoRa modem). Granting Bluetooth lets the app receive and send
          messages over the LoRa mesh.
        NSCameraUsageDescription: >-
          Reticulum uses the camera to scan QR codes encoding another
          user's destination hash or IdentityCard so you can add them
          as a contact without typing a 32-character hex string.
    sources:
      - path: iosApp
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.thatsfguy.reticulum.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        FRAMEWORK_SEARCH_PATHS:
          - $(SRCROOT)/../shared/build/XCFrameworks/release
        # Shared.xcframework requests autolink for `ReticulumCrypto`
        # (the Swift CryptoKit wrapper static lib produced by Gradle's
        # buildIosCryptoBridge task). The xcframework doesn't bundle
        # the .a file, so we have to point the app's linker at it.
        # The slice for arm64 device builds lives in iosArm64/.
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/../shared/build/iosCryptoBridge/iosArm64
          - $(SRCROOT)/../shared/build/iosCryptoBridge/iosSimulatorArm64
          - $(SRCROOT)/../shared/build/iosCryptoBridge/iosX64
        # The SQLDelight native driver pulled in by iosMain references
        # libsqlite3 symbols that ship with iOS at /usr/lib/libsqlite3.tbd.
        # Add it to the app's other linker flags so the autolinker can
        # resolve `_sqlite3_*` symbols.
        OTHER_LDFLAGS:
          - -lsqlite3
    dependencies:
      - framework: ../shared/build/XCFrameworks/release/Shared.xcframework
        embed: false
        # The Shared framework is built as static (see
        # `shared/build.gradle.kts` — `isStatic = true`), so we don't
        # embed it into the app bundle; its symbols are linked
        # directly into the app binary at compile time.
