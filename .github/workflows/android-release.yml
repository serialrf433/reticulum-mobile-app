name: Android release

# Push a tag like `android-v0.1.0` to build a signed AAB and attach it to a
# GitHub release. Pattern mirrors the webclient's build-apk.yml.

on:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Set ANDROID_KEYSTORE_BASE64 secret with the base64-encoded keystore."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Upload AAB to release
        uses: softprops/action-gh-release@v2
        with:
          files: androidApp/build/outputs/bundle/release/*.aab
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
