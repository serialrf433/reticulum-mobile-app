name: Android release

# Push a tag like `android-v0.1.0` to build a signed AAB + APK and attach
# both to a GitHub release. Pattern mirrors the webclient's build-apk.yml.

on:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pin Gradle 8.7 — runner images now ship Gradle 9.4.1, which
      # removed `DefaultArtifactPublicationSet` (still referenced by
      # AGP and the KMP iOS-target plumbing). Without the pin the
      # bootstrap step crashes before installing the project's wrapper.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: Derive version from tag
        # The tag is the source of truth. `build.gradle.kts` reads
        # versionName / versionCode from these `-P` properties and falls
        # back to a clearly-marked `0.0.0-dev` literal for local builds.
        # Wiring it this way means the About screen always reflects the
        # tag; the previous setup required someone to bump the literal
        # in build.gradle.kts before tagging and that step drifted five
        # releases in a row.
        #
        # versionCode math: MA*10000 + MI*100 + PA. So 0.1.92 → 192,
        # 0.2.0 → 200, 1.0.0 → 10000. Monotonic across all reasonable
        # semver bumps because the major axis (×10000) dominates the
        # 0..99 range of minor (×100) and patch (×1). The previous
        # one-per-release counter ran up to versionCode 87; the first
        # CI-built release (0.1.92) lands at 192 — a 105-step jump
        # that's still strictly monotonic, and this app has never
        # shipped on Play (applicationId ends `.native` specifically
        # to avoid clobbering the Play webclient install) so the
        # discontinuity has no real-world consequence.
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#android-v}"
          IFS='.' read -r MA MI PA <<< "$TAG"
          if ! [[ "$MA" =~ ^[0-9]+$ && "$MI" =~ ^[0-9]+$ && "$PA" =~ ^[0-9]+$ ]]; then
            echo "::error::tag $GITHUB_REF_NAME does not match android-vMAJOR.MINOR.PATCH"
            exit 1
          fi
          CODE=$((MA*10000 + MI*100 + PA))
          echo "VERSION_NAME=$TAG"  >> "$GITHUB_ENV"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_ENV"
          echo "Building $TAG (versionCode=$CODE)"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Set ANDROID_KEYSTORE_BASE64 secret with the base64-encoded keystore."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed AAB and APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          # Optional — falls back to RELEASE_STORE_PASSWORD inside the
          # build script when this secret is unset, matching the
          # webclient's single-password keystore.
          RELEASE_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease \
            -PversionName="$VERSION_NAME" \
            -PversionCode="$VERSION_CODE"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/apk/release/*.apk
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
