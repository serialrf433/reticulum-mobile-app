name: iOS XCFramework

# Phase 1 smoke test: produce shared/build/XCFrameworks/release/Shared.xcframework
# from the KMP shared module. Doesn't ship a binary anywhere yet — just proves
# the iOS targets compile and link cleanly.
#
# Runs only when the shared module or this workflow changes; the Android CI
# already covers everything else and burning macOS minutes on every push to
# androidApp/ is wasteful.
#
# Requires macOS because Kotlin/Native for Apple targets is bound to the
# Xcode toolchain.

on:
  push:
    branches: [master]
    paths:
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  xcframework:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      # Pin Gradle 8.7 because macos-14 runners' system Gradle is now
      # 9.4.1, which removed `DefaultArtifactPublicationSet` — a class
      # the Android Gradle Plugin still references. Without this pin
      # the bootstrap `gradle wrapper` invocation fails before it can
      # install the project's pinned wrapper.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: '8.7'

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: Assemble Shared.xcframework
        run: ./gradlew :shared:assembleSharedXCFramework

      # Phase 4: actually exercise the iOS-side actuals (CryptoKit /
      # CommonCrypto for IosCryptoProvider, libbz2 cinterop, etc.) on
      # the simulator. The runner is Apple Silicon (macos-14), so
      # iosSimulatorArm64Test is the canonical target — runs the
      # compiled K/N test binary natively without booting a sim.
      #
      # The contract suite under
      # shared/src/commonTest/.../crypto/CryptoProviderContractTest.kt
      # pins divergences from the Android contract — including the
      # v1.0.2 outbound-LXMF bug where iOS aesCbcEncrypt double-IV'd
      # the wire token.
      - name: Run iOS shared-module tests
        run: ./gradlew :shared:iosSimulatorArm64Test

      - name: Upload iOS test report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: iosSimulatorArm64Test-report
          path: shared/build/reports/tests/iosSimulatorArm64Test
          if-no-files-found: warn
          retention-days: 14

      - name: Verify XCFramework structure
        run: |
          set -e
          xcf=shared/build/XCFrameworks/release/Shared.xcframework
          test -d "$xcf" || (echo "XCFramework dir missing"; exit 1)
          ls -1 "$xcf"
          # Each slice should have a Headers/ dir with a generated Shared.h.
          # If any expect-without-actual leaked through, this header is
          # incomplete and downstream Swift consumers fail at import time.
          for slice in "$xcf"/ios-*; do
            test -f "$slice/Shared.framework/Headers/Shared.h" \
              || (echo "missing $slice/Shared.framework/Headers/Shared.h"; exit 1)
          done
          echo "OK"

      - name: Upload XCFramework
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: Shared.xcframework
          path: shared/build/XCFrameworks/release/Shared.xcframework
          if-no-files-found: error
          retention-days: 14
