name: iOS release

# Push a tag like `ios-v0.1.0` to build an UNSIGNED iOS .ipa and attach
# it to a GitHub release. Pattern mirrors `android-release.yml`.
#
# Why unsigned? The user's stance is "personal sideload only — never
# publishing to the App Store" (see root README's iOS section). The
# unsigned .ipa is intended for AltStore / Sideloadly / SideStore
# style flows that re-sign locally with the user's free Apple ID.
# Skips the $99/year Apple Developer Program fee, the App Review
# process, and the storage of any signing certificates in this repo.

on:
  push:
    tags:
      - 'ios-v*'

# Least privilege at the top level; the build job re-grants contents:write
# for the release upload, so any future non-publishing job defaults to read.
permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write   # softprops/action-gh-release uploads the unsigned IPA
    # Use macos-15 (Xcode 16) so the project format matches what
    # current XcodeGen generates. macos-14 (Xcode 15.4) rejected the
    # generated `.xcodeproj` with "future Xcode project file format
    # (77)" — XcodeGen no longer honors `xcodeVersion: "15.4"` for the
    # objectVersion field. Our iOS deployment target is 15.0, which
    # Xcode 16 still supports, so the runner bump is no-op for end
    # users.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '17'

      # Pin Gradle 8.7 — same workaround as ios-build.yml /
      # android-ci.yml. Newer GHA images ship Gradle 9.x which removed
      # `DefaultArtifactPublicationSet` (still referenced by AGP and
      # the KMP iOS-target setup).
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: '8.7'

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
            chmod +x ./gradlew
          fi

      - name: Derive version from tag
        # Strip the `ios-v` prefix so the file name suffix is the
        # plain semver string the tester recognises (e.g. 1.0.11 not
        # ios-v1.0.11). Mirrors the android-release.yml derive step.
        # IPA_NAME is reused by Repackage / Validate / Upload steps so
        # there's a single source of truth for the artifact filename.
        # The `-unsigned` marker stays in the filename — it's a useful
        # flag that the IPA still needs AltStore / Sideloadly signing
        # before it'll install on a device.
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#ios-v}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag $GITHUB_REF_NAME does not match ios-vMAJOR.MINOR.PATCH"
            exit 1
          fi
          IPA_NAME="Reticulum-iOS-${TAG}-unsigned.ipa"
          echo "VERSION_NAME=$TAG"   >> "$GITHUB_ENV"
          echo "IPA_NAME=$IPA_NAME"  >> "$GITHUB_ENV"
          echo "Building $TAG → $IPA_NAME"

      - name: Build Shared.xcframework
        # Includes the iosCryptoBridge Swift static library (built by
        # the `buildIosCryptoBridge` Gradle task that's a dependency
        # of the link step).
        run: ./gradlew :shared:assembleSharedXCFramework

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate iosApp.xcodeproj
        working-directory: iosApp
        run: xcodegen generate

      - name: Stamp Info.plist with the tag's version
        # XcodeGen's project.yml hardcodes
        # CFBundleShortVersionString="0.1.0" / CFBundleVersion="1" so
        # local builds have something sensible. In CI we overwrite both
        # keys with the real tag-derived $VERSION_NAME after xcodegen
        # runs, so the shipped IPA's Settings → About row reads the
        # actual version (e.g. "Reticulum Mobile · iOS 1.0.24") instead
        # of the placeholder "0.1.0" or the default "dev" fallback in
        # SettingsView.swift's versionString reader. plutil ships in
        # every macOS runner image; safer than mutating project.yml
        # itself which is in git.
        #
        # Origin: this step was first added in b40d99e, accidentally
        # carried along the engine-refactor revert in 0687713, and
        # forgotten on the re-introduction of the engine work — every
        # ios-v* between v1.0.18 and v1.0.23 shipped reading "0.1.0"
        # in the About row. The Validate-IPA step below now asserts
        # CFBundleShortVersionString == $VERSION_NAME so a future
        # revert can't silently re-break this.
        working-directory: iosApp
        run: |
          set -e
          INFO=iosApp/Info.plist
          if [ ! -f "$INFO" ]; then
            echo "::error::Info.plist not found at $INFO after xcodegen"
            exit 1
          fi
          /usr/bin/plutil -replace CFBundleShortVersionString -string "$VERSION_NAME" "$INFO"
          /usr/bin/plutil -replace CFBundleVersion -string "$VERSION_NAME" "$INFO"
          echo "Stamped $INFO → CFBundleShortVersionString=$VERSION_NAME CFBundleVersion=$VERSION_NAME"

      - name: Build iosApp.app (unsigned)
        # `xcodebuild build` with a known derivedDataPath gives a
        # predictable .app location: <dd>/Build/Products/Release-iphoneos/<target>.app.
        # We avoid `archive` because CODE_SIGNING_ALLOWED=NO + archive
        # produces an inconsistent layout that differs across Xcode
        # versions; `build` is stable.
        #
        # `set -o pipefail` is critical: without it, `xcodebuild | tee`
        # masks xcodebuild's exit code (the pipe inherits tee's), so
        # ** BUILD FAILED ** silently shipped a 1.6 KB resource-only .app
        # in v0.1.1 (Swift compile errors didn't propagate).
        working-directory: iosApp
        run: |
          set -eo pipefail
          mkdir -p build
          xcodebuild build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            -allowProvisioningUpdates=NO \
            | tee build/archive.log
          APP_PATH=$(find build/dd/Build/Products/Release-iphoneos -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::no .app found under derivedDataPath"
            find build/dd -name '*.app' -type d
            exit 1
          fi
          echo "✓ built $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Repackage .app → .ipa
        # An .ipa is just a zip of `Payload/<App>.app`. AltStore /
        # Sideloadly / SideStore re-sign the inner .app locally with
        # the user's free Apple ID before installing. Filename is
        # version-suffixed (set in the Derive step) so testers'
        # Downloads folders stay disambiguated across releases.
        working-directory: iosApp
        run: |
          set -e
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -qr "$IPA_NAME" Payload
          echo "✓ ipa built: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      - name: Validate IPA structure
        # Sideload-equivalent of `xcrun altool --validate-app`. We can't
        # run altool because that's the App Store submission validator
        # and requires a signed bundle + Apple Developer Program
        # enrollment — neither of which apply to this unsigned-sideload
        # workflow. Instead, run the structural checks that catch every
        # class of failure we've actually shipped:
        #
        #   v0.1.1, e8c58a6 — Swift compile errors masked by `xcodebuild
        #     | tee` exit-code swallow shipped a 1.6 KB resource-only
        #     IPA. The `set -o pipefail` upstream + the size floor here
        #     are belt-and-braces.
        #   c67d3ac — missing libReticulumCrypto.a / libsqlite3 link.
        #     `otool -L` on the main exec catches dangling @rpath refs.
        #   2c2475c — per-target deploymentTarget drift between the
        #     Shared framework and the app target. `vtool -show-build`
        #     surfaces the linked binary's minos so a future drift
        #     fails the build instead of crashing on older iOS at
        #     runtime.
        #   capability-regression class — UIBackgroundModes silently
        #     dropping `bluetooth-central` would break background BLE
        #     with no compile-time signal. Asserted explicitly below.
        working-directory: iosApp
        run: |
          set -euo pipefail

          IPA="build/$IPA_NAME"
          EXPECTED_BUNDLE_ID="io.github.thatsfguy.reticulum.ios"
          EXPECTED_MIN_OS="17.0"
          # Calibrated against ios-v0.1.5 (2.29 MB) — the last
          # known-good release. iOS apps with statically-linked KMP +
          # system-framework SwiftUI/UIKit are genuinely small (Apple
          # provides the UI runtime via system frameworks; the bundle
          # is just the app's static binary + assets), so a 1 MB floor
          # is the right tradeoff: 600× larger than the 1.6 KB
          # resource-only regression (v0.1.1, e8c58a6) but half of
          # normal builds, leaving headroom for the binary to grow or
          # shrink without false-tripping. v0.1.8 tripped the previous
          # 5 MB floor on a healthy 2.3 MB IPA — that was the false-
          # positive that prompted this recalibration.
          MIN_IPA_BYTES=$((1 * 1024 * 1024))

          echo "::group::IPA file"
          ls -lh "$IPA"
          file "$IPA"
          echo "::endgroup::"

          echo "::group::Zip integrity"
          unzip -t "$IPA" > /dev/null
          echo "✓ archive integrity OK"
          echo "::endgroup::"

          SIZE=$(stat -f%z "$IPA")
          if [ "$SIZE" -lt "$MIN_IPA_BYTES" ]; then
            echo "::error::IPA is suspiciously small ($SIZE bytes < $MIN_IPA_BYTES). v0.1.1 shipped a 1.6 KB resource-only IPA — check the xcodebuild log for masked Swift compile errors."
            exit 1
          fi
          echo "✓ IPA size: $SIZE bytes"

          EXTRACT="build/ipa-extract"
          rm -rf "$EXTRACT"
          mkdir -p "$EXTRACT"
          unzip -q "$IPA" -d "$EXTRACT"

          APP=$(find "$EXTRACT/Payload" -maxdepth 1 -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::no .app under Payload/"
            ls -la "$EXTRACT/Payload" || true
            exit 1
          fi
          echo "✓ found app bundle: $APP"

          PLIST="$APP/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "::error::missing Info.plist at $PLIST"
            exit 1
          fi

          echo "::group::Info.plist"
          plutil -lint "$PLIST"
          echo "::endgroup::"

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST")
          if [ "$BUNDLE_ID" != "$EXPECTED_BUNDLE_ID" ]; then
            echo "::error::CFBundleIdentifier=$BUNDLE_ID, expected $EXPECTED_BUNDLE_ID"
            exit 1
          fi
          echo "✓ CFBundleIdentifier: $BUNDLE_ID"

          # Regression guard for the "in-app version shows 0.1.0" bug
          # (fixed b40d99e, reverted-by-accident 0687713, reintroduced
          # 2026-05-11). The Stamp-Info.plist step above plutil-replaces
          # these two keys; if a future revert removes that step, the
          # IPA would silently ship the project.yml placeholder again.
          # Asserting here makes the release FAIL instead of hiding the
          # regression behind a successful build.
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          if [ "$SHORT_VERSION" != "$VERSION_NAME" ]; then
            echo "::error::CFBundleShortVersionString=$SHORT_VERSION, expected $VERSION_NAME — Stamp-Info.plist step likely missing or skipped (cf. b40d99e / 0687713)"
            exit 1
          fi
          echo "✓ CFBundleShortVersionString: $SHORT_VERSION (matches tag)"

          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          if [ "$BUNDLE_VERSION" != "$VERSION_NAME" ]; then
            echo "::error::CFBundleVersion=$BUNDLE_VERSION, expected $VERSION_NAME — Stamp-Info.plist step likely missing or skipped"
            exit 1
          fi
          echo "✓ CFBundleVersion: $BUNDLE_VERSION (matches tag)"

          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$PLIST")
          BIN="$APP/$EXEC"
          if [ ! -f "$BIN" ]; then
            echo "::error::CFBundleExecutable=$EXEC missing at $BIN"
            ls -la "$APP" || true
            exit 1
          fi
          echo "✓ executable: $EXEC"

          MIN_OS=$(/usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST")
          if [ "$MIN_OS" != "$EXPECTED_MIN_OS" ]; then
            echo "::error::Info.plist MinimumOSVersion=$MIN_OS, expected $EXPECTED_MIN_OS"
            exit 1
          fi
          echo "✓ MinimumOSVersion: $MIN_OS"

          # bluetooth-central + the camera/bluetooth usage descriptions
          # are required for the QR-scan + background-BLE features to
          # work at runtime. iOS rejects the permission prompt without
          # them, and the feature silently fails — no crash, no log.
          /usr/libexec/PlistBuddy -c "Print :NSBluetoothAlwaysUsageDescription" "$PLIST" > /dev/null
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST" > /dev/null
          echo "✓ usage descriptions present (bluetooth, camera)"

          # Privacy Manifest required by iOS 17+ / Apple Privacy
          # Manifest spec. Without `PrivacyInfo.xcprivacy` in the
          # bundle root, recent AltStore / SideStore / iOS 26+ versions
          # reject the install with "Undeclared permissions". File
          # contents are reviewed in `iosApp/AppStore/PrivacyInfo.xcprivacy`
          # (the source) and copied into `iosApp/iosApp/` so XcodeGen
          # picks it up as a bundle resource.
          if [ ! -f "$APP/PrivacyInfo.xcprivacy" ]; then
            echo "::error::PrivacyInfo.xcprivacy missing from app bundle — required by iOS 17+ Privacy Manifest spec"
            exit 1
          fi
          echo "✓ PrivacyInfo.xcprivacy present"

          BG_MODES=$(/usr/libexec/PlistBuddy -c "Print :UIBackgroundModes" "$PLIST" 2>/dev/null || echo "")
          if ! echo "$BG_MODES" | grep -q "bluetooth-central"; then
            echo "::error::UIBackgroundModes missing 'bluetooth-central' — background BLE will silently fail at runtime"
            echo "$BG_MODES"
            exit 1
          fi
          echo "✓ UIBackgroundModes includes bluetooth-central"

          echo "::group::Mach-O binary"
          file "$BIN"
          if ! file "$BIN" | grep -q "Mach-O 64-bit executable arm64"; then
            echo "::error::executable is not Mach-O 64-bit arm64"
            exit 1
          fi
          echo "✓ Mach-O 64-bit arm64"
          echo "::endgroup::"

          echo "::group::vtool deployment target"
          vtool -show-build "$BIN"
          BIN_MIN=$(vtool -show-build "$BIN" | awk '/^[[:space:]]*minos/ { print $2; exit }')
          if [ "$BIN_MIN" != "$EXPECTED_MIN_OS" ]; then
            echo "::error::binary LC_BUILD_VERSION minos=$BIN_MIN, expected $EXPECTED_MIN_OS (per-target deploymentTarget drift — see commit 2c2475c)"
            exit 1
          fi
          echo "✓ binary minos: $BIN_MIN"
          echo "::endgroup::"

          echo "::group::otool -L"
          otool -L "$BIN"
          echo "::endgroup::"

          # Every @rpath-based dynamic dep must have a matching file
          # under Frameworks/. Missing ones produce a "Library not
          # loaded" crash at app launch with no compile-time warning.
          # System paths (/usr/lib, /System) are loaded by dyld from
          # the OS image, not the app bundle — those are fine.
          MISSING=0
          while IFS= read -r ref; do
            case "$ref" in
              @rpath/*)
                rel=${ref#@rpath/}
                if [ ! -e "$APP/Frameworks/$rel" ]; then
                  echo "::error::missing bundled dep: $ref (expected at $APP/Frameworks/$rel)"
                  MISSING=$((MISSING + 1))
                fi
                ;;
            esac
          done < <(otool -L "$BIN" | tail -n +2 | awk '{ print $1 }')
          if [ "$MISSING" -gt 0 ]; then
            exit 1
          fi
          echo "✓ all @rpath dynamic deps resolved (or none — Shared.xcframework is statically linked)"

          rm -rf "$EXTRACT"
          echo ""
          echo "✅ IPA structure validation passed"

      - name: Compose release body
        # If `.github/release-notes/<tag>.md` exists, prepend it to the
        # sideload boilerplate so the release page leads with the
        # human-written highlights and falls back to the standard
        # AltStore instructions. When the file is absent, the body is
        # just the boilerplate — matches the historical minimal style
        # of earlier ios-v* releases (and android-v1.2.6 etc.).
        run: |
          set -e
          mkdir -p iosApp/build
          NOTES=".github/release-notes/${GITHUB_REF_NAME}.md"
          BODY="iosApp/build/release-body.md"
          : > "$BODY"
          if [ -f "$NOTES" ]; then
            echo "✓ found per-tag notes at $NOTES"
            cat "$NOTES" >> "$BODY"
            printf '\n---\n\n' >> "$BODY"
          else
            echo "no per-tag notes at $NOTES — using boilerplate only"
          fi
          cat >> "$BODY" <<EOF
          **Unsigned iOS build — sideload via AltStore / Sideloadly / SideStore.**

          Download \`$IPA_NAME\` and re-sign with your free Apple ID using your sideloading tool of choice. Apps signed with a free Apple ID expire after 7 days; AltStore can auto-renew while it's running on your Mac.

          This app is **not published to the App Store** — see the iOS section of the README for the rationale.
          EOF
          echo "RELEASE_BODY_PATH=$BODY" >> "$GITHUB_ENV"
          echo "::group::Composed release body"
          cat "$BODY"
          echo "::endgroup::"

      - name: Upload IPA to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            iosApp/build/${{ env.IPA_NAME }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # Marked prerelease so Obtainium (and the README "Latest
          # release" shields.io badge) treats Android tags as the
          # primary distribution channel. iOS users discover the IPA
          # via the AltStore / Sideloadly flow already documented in
          # the README — they don't browse GitHub's "latest" pointer.
          prerelease: true
          body_path: ${{ env.RELEASE_BODY_PATH }}

      - name: Refresh the AltStore source
        # Keeps docs/altstore.json — served by GitHub Pages, the URL
        # users add to AltStore / SideStore — current with this
        # release, so the source is a live update channel and not a
        # one-shot listing. Prepends this version to apps[0].versions
        # and refreshes the flat AltStore-1.x fields, then commits the
        # regenerated JSON back to master. `[skip ci]` keeps the
        # docs-only commit from re-triggering workflows. continue-on-
        # error so a branch-protection push refusal can't red-flag an
        # otherwise-successful release — the IPA is already uploaded.
        continue-on-error: true
        run: |
          set -euo pipefail
          IPA="iosApp/build/$IPA_NAME"
          SIZE=$(stat -f%z "$IPA")
          TODAY=$(date -u +%Y-%m-%d)
          DL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${IPA_NAME}"
          DESC="See the GitHub release notes for ${GITHUB_REF_NAME}."

          git fetch --depth=1 origin master
          git checkout -B master origin/master

          jq --arg v "$VERSION_NAME" --arg d "$TODAY" --arg u "$DL" \
             --arg desc "$DESC" --argjson s "$SIZE" '
            .apps[0].version = $v
            | .apps[0].versionDate = $d
            | .apps[0].versionDescription = $desc
            | .apps[0].downloadURL = $u
            | .apps[0].size = $s
            | .apps[0].versions =
                ([{version: $v, date: $d, localizedDescription: $desc,
                   downloadURL: $u, size: $s, minOSVersion: "17.0"}]
                 + (.apps[0].versions | map(select(.version != $v))))
          ' docs/altstore.json > docs/altstore.json.tmp
          mv docs/altstore.json.tmp docs/altstore.json

          if git diff --quiet -- docs/altstore.json; then
            echo "altstore.json already current for $VERSION_NAME"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/altstore.json
          git commit -m "chore(altstore): publish $VERSION_NAME to the AltStore source [skip ci]"
          git push origin master

      - name: Upload archive log on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: archive-log
          path: iosApp/build/archive.log
          if-no-files-found: ignore
